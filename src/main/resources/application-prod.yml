spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  jpa:
    show-sql: false

  flyway:
    enabled: true

server:
  port: ${PORT:8080}

square:
  environment: ${SQUARE_ENVIRONMENT:PRODUCTION}
  webhook-url: ${SQUARE_WEBHOOK_URL}
  webhook-verify-signature: true
  terminal-device-id: ${SQUARE_TERMINAL_DEVICE_ID}

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

logging:
  level:
    com.brewbble: INFO
    org.springframework.security: WARN
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
