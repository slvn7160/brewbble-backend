spring:
  application:
    name: brewbble-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/brewbble
    username: brewbble
    password: brewbble
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
  servlet:
    context-path: /

app:
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-key-must-be-at-least-32-chars-long}
    expiration-ms: 86400000   # 24 hours

square:
  access-token: ${SQUARE_ACCESS_TOKEN:sandbox-access-token}
  location-id: ${SQUARE_LOCATION_ID:sandbox-location-id}
  environment: ${SQUARE_ENVIRONMENT:SANDBOX}
  webhook-signature-key: ${SQUARE_WEBHOOK_SIGNATURE_KEY:}
  webhook-url: ${SQUARE_WEBHOOK_URL:http://localhost:8080/api/v1/payments/webhook}
  webhook-verify-signature: false   # disabled in sandbox — Square test events use fake signatures

logging:
  level:
    com.brewbble: DEBUG
    org.springframework.security: INFO
